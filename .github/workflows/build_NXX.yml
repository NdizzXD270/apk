name: Build APK for NXX

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Create web files
        run: |
          mkdir -p webapp
          cat > webapp/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe src="https://smpn1pakuhaji.vercel.app/" allow="geolocation; microphone; camera; payment"></iframe>
</body>
</html>
EOF
          
      - name: Create icon
        run: |
          echo "" | base64 -d > webapp/icon.png
          
      - name: Setup Capacitor
        run: |
          cd webapp
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "NXX" "com.app.nxx" --web-dir=.
          npx cap add android
          cd ..
          
      - name: Build APK
        run: |
          cd webapp/android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NXX
          path: webapp/android/app/build/outputs/apk/debug/
